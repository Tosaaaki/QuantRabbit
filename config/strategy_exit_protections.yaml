# Strategy-specific BE trail / TP move overrides.
# Values are in pips and seconds.

defaults:
  apply_when_soft_tp: true
  neg_exit:
    enabled: true
    allow_reasons:
      - hard_stop
      - tech_hard_stop
      - tech_return_fail
      - tech_reversal_combo
      - tech_candle_reversal
      - tech_nwave_flip
      - rsi_fade
      - m1_rsi_fade
      - vwap_cut
      - m1_vwap_cut
      - atr_spike
      - m1_atr_spike
      - structure_break
      - m1_structure_break
      - reentry_reset
      - max_hold
      - max_adverse
      - fast_cut_time
      - lock_floor
      - take_profit
      - take_profit_zone
      - range_timeout
      - candle_*
      - partial_take
      - be_stop
      - time_stop
      - no_recovery
      - max_floating_loss
      - timeout
      - mtf_reversal
      - trend_failure
      - trend_exhaust
      - drawdown
      - max_drawdown
      - health_exit
      - hazard_exit
      - margin_health
      - free_margin_low
      - margin_usage_high
    deny_reasons: []
  min_profit_pips:
    macro: 2.5
    micro: 1.2
    scalp: 1.0
  min_profit_ratio:
    macro: 0.35
    micro: 0.25
    scalp: 0.28
  min_profit_ratio_min_tp_pips: 1.5
  min_profit_ratio_reasons:
    - partial_take
    - fast_cut_time
    - lock_floor
    - take_profit
    - range_timeout
    - time_stop
    - trail_take
    - lock_release
    - take_profit_zone
    - rsi_take
    - trail_lock
    - profit_lock
    - lock_trail
    - near_be
  end_reversal_exit:
    # Allow early profit-taking when trend exhaustion signs cluster (to catch small rebounds).
    enabled: true
    score_min: 0.58
    min_profit_pips: 0.2
    max_factor_age_sec: 150
    reasons:
      - take_profit
      - take_profit_zone
      - rsi_take
      - lock_floor
      - trail_take
      - trail_lock
      - profit_lock
      - lock_trail
      - near_be
      - range_timeout
      - candle_*
    # Score components are normalized in order_manager:
    # RSI extreme, MA gap compression, ADX cooldown, VWAP gap compression, M1-M5 gap slope.
    rsi_center: 35.0
    rsi_band: 12.0
    adx_center: 24.0
    adx_band: 12.0
    gap_ref_pips: 8.0
    gap_band_pips: 10.0
    vwap_ref: 16.0
    slope_ref_pips: 6.0
  be_profile:
    macro: {trigger_pips: 8.0, lock_ratio: 0.50, min_lock_pips: 3.5, cooldown_sec: 120}
    micro: {trigger_pips: 2.2, lock_ratio: 0.50, min_lock_pips: 0.60, cooldown_sec: 45}
    scalp: {trigger_pips: 1.6, lock_ratio: 0.35, min_lock_pips: 0.50, cooldown_sec: 20}
  start_delay_sec:
    macro: 120
    micro: 25
    scalp: 12
  max_delay_sec:
    macro: 600
    micro: 70
    scalp: 35
  tp_move:
    enabled: true
    macro: {trigger_pips: 8.0, buffer_pips: 3.5}
    micro: {trigger_pips: 2.0, buffer_pips: 1.0}
    scalp: {trigger_pips: 1.0, buffer_pips: 0.8}
  tp_move_min_gap_pips: 0.3
  exit_profile:
    min_hold_sec: 10
    profit_pips: 1.5
    trail_start_pips: 2.1
    trail_backoff_pips: 0.7
    lock_buffer_pips: 0.35
    range_profit_pips: 1.2
    range_trail_start_pips: 1.7
    range_trail_backoff_pips: 0.55
    range_lock_buffer_pips: 0.25
    range_max_hold_sec: 600
    loss_cut_enabled: false
    loss_cut_require_sl: true
    loss_cut_soft_pips: 12
    loss_cut_hard_pips: 30
    loss_cut_max_hold_sec: 1200
    loss_cut_cooldown_sec: 8
    loss_cut_reason_soft: m1_structure_break
    loss_cut_reason_hard: max_adverse
    loss_cut_reason_time: time_stop
  # Macro-specific exit profile: longer hold, wider trails, let trends develop.
  macro_exit_profile:
    min_hold_sec: 300
    profit_pips: 6.0
    trail_start_pips: 8.0
    trail_backoff_pips: 3.0
    lock_buffer_pips: 2.0
    lock_floor_min_hold_sec: 300
    range_profit_pips: 4.0
    range_trail_start_pips: 5.5
    range_trail_backoff_pips: 2.0
    range_lock_buffer_pips: 1.5
    range_max_hold_sec: 7200
    loss_cut_enabled: true
    loss_cut_require_sl: false
    loss_cut_soft_pips: 0.0
    loss_cut_hard_pips: 35.0
    loss_cut_max_hold_sec: 14400
    loss_cut_cooldown_sec: 30
    loss_cut_reason_hard: hard_stop
    loss_cut_reason_time: time_stop
    tick_imb:
      partial_enabled: true
      partial_trigger_pips: 1.0
      partial_fraction: 0.4
      partial_min_units: 1000
      partial_min_remaining: 1000
      be_buffer_pips: 0.2
      min_hold_sec: 0
      profit_pips: 0
      trail_start_pips: 0
      trail_backoff_pips: 0
      lock_buffer_pips: 0
      max_hold_sec: 0
      max_adverse_pips: 0
  pro_stop:
    enabled: true
    score_min: 2
    require_signal: true
    soft_pips: 3.4
    hard_pips: 9.5
    min_hold_sec: 203
    max_hold_sec: 1760

scalp_ping_5s_no_block_neg_exit_allow_reasons: &SCALP_PING_5S_NO_BLOCK_NEG_EXIT_ALLOW_REASONS
