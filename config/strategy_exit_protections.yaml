  # B/C profile: keep direction logic but let profitable legs breathe longer.
  scalp_ping_5s_b:
    <<: *SCALP_PING_5S_EXIT_PROFILE
    exit_profile: &SCALP_PING_5S_BC_EXIT_PROFILE
      profit_pips: 2.4
      trail_start_pips: 2.7
      trail_backoff_pips: 1.00
      lock_buffer_pips: 0.75
      lock_floor_min_hold_sec: 30
      range_profit_pips: 1.8
      range_trail_start_pips: 2.2
      range_trail_backoff_pips: 0.85
      range_lock_buffer_pips: 0.60
      # 取り残し対策: 新規建玉のみを対象に、反転検知+時間上限で tail を抑える。
      loss_cut_enabled: true
      loss_cut_require_sl: false
      # Soft は hidden hard-stop になりやすいため無効化し、方向反転シグナルを優先する。
      loss_cut_soft_pips: 0.0
      # 6.0->3.8p: SL平均損失を抑制。B/CのTP(0.5-0.9p)に対し6.0pは広すぎる。
      loss_cut_hard_pips: 3.8
      loss_cut_hard_cap_pips: 4.0
      # 15分->8分: tail risk 早期カット
      loss_cut_max_hold_sec: 480
      loss_cut_cooldown_sec: 4
      # 非レンジの含み損を長時間放置しない（range_timeout 依存を回避）。
      # 13分->6分
      non_range_max_hold_sec: 360
      # VM実測: short+MARKET_ORDER_TRADE_CLOSE の長期保有損失を抑える。
      # 4分->3分
      non_range_max_hold_sec_short: 180
      direction_flip:
        enabled: true
        # 75s->35s: 方向転換の検知を早期化
        min_hold_sec: 35
        # 1.5p->0.8p: TP対比でリスクを削減
        min_adverse_pips: 0.8
        # Suspicious phase: de-risk first, then full close only on stronger continuation.
        de_risk_enabled: true
        de_risk_threshold: 0.46
        de_risk_fraction: 0.55
        de_risk_min_units: 1000
        de_risk_min_remaining: 1000
        de_risk_cooldown_sec: 10
        de_risk_reason: risk_reduce
        score_threshold: 0.54
        release_threshold: 0.40
        confirm_hits: 2
        confirm_window_sec: 15
        cooldown_sec: 5
        forecast_weight: 0.45
        # shortの取り残しを抑えるため、逆行時は早期にde-risk/closeへ寄せる。
        short_min_hold_sec: 20
        short_min_adverse_pips: 0.5
        short_score_threshold: 0.48
        short_release_threshold: 0.36
        short_confirm_hits: 2
        short_confirm_window_sec: 10
        short_de_risk_threshold: 0.42
        short_forecast_weight: 0.55
        reason: m1_structure_break
    neg_exit:
      # B も no-block 運用へ寄せ、close_reject_no_negative の再発を防ぐ。
      strict_no_negative: false
      allow_reasons: *SCALP_PING_5S_NO_BLOCK_NEG_EXIT_ALLOW_REASONS
      deny_reasons: []

