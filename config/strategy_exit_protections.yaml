    exit_profile:
      # 取り残し対策: 新規建玉のみを対象に、反転検知+時間上限で tail を抑える。
      loss_cut_enabled: true
      loss_cut_require_sl: false
      # Soft は hidden hard-stop になりやすいため無効化し、方向反転シグナルを優先する。
      loss_cut_soft_pips: 0.0
      # SL平均損失-69.81対策: 8.0->4.5pに引き締め。TP 0.3-0.8p に対し 8.0p は 10:1超の非対称。
      loss_cut_hard_pips: 4.5
      # 20分->10分: スキャルプに20分は長すぎる。
      loss_cut_max_hold_sec: 600
      loss_cut_cooldown_sec: 4
      # 非レンジの含み損を長時間放置しない（range_timeout 依存を回避）。
      # 15分->7分に短縮。
      non_range_max_hold_sec: 420
      direction_flip:
        enabled: true
        # 90s->45s: スキャルプで90秒待つのは遅すぎる。方向転換の検知を早期化。
        min_hold_sec: 45
        # 1.8p->1.0p: TP 0.3-0.8p の戦略で 1.8p逆行は深すぎる。
        min_adverse_pips: 1.0
        # Suspicious phase: de-risk first, then full close only on stronger continuation.
        de_risk_enabled: true
        # de-risk閾値を下げて早期にリスク軽減
        de_risk_threshold: 0.48
        de_risk_fraction: 0.50
        de_risk_min_units: 1000
        de_risk_min_remaining: 1000
        de_risk_cooldown_sec: 10
        de_risk_reason: risk_reduce
        # score閾値を下げて、反転確認を早期化
        score_threshold: 0.58
        release_threshold: 0.42
        confirm_hits: 2
        confirm_window_sec: 18
        cooldown_sec: 6
        forecast_weight: 0.40
        reason: m1_structure_break
    neg_exit:
      enabled: true
      strict_no_negative: true
      strict_allow_reasons:
        - profit_bank_release
        - hard_stop
        - tech_hard_stop
        - max_adverse
        - max_floating_loss
        - no_recovery
        - giveback_lock
        - time_stop
        - timeout
        - drawdown
        - max_drawdown
        - m1_structure_break
        - risk_reduce
        - reentry_reset
        - __de_risk__
        - health_exit
        - margin_health
        - free_margin_low
        - margin_usage_high
        - lock_floor
        - trail_lock
        - near_be
      allow_reasons:
        - profit_bank_release
        - hard_stop
        - tech_hard_stop
        - max_adverse
        - max_floating_loss
        - no_recovery
        - giveback_lock
