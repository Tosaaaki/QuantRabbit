# QuantRabbit local-safe MCP config (read-only by design)

# ローカルDBは読み取り前提。実体は SQLite 読み取り専用サーバー。
[mcp_servers.qr_local_trades_db]
command = "python3"
args = [
  "/Users/tossaki/Documents/App/QuantRabbit/scripts/mcp_sqlite_readonly.py",
  "--db",
  "/Users/tossaki/Documents/App/QuantRabbit/logs/trades.db",
]
enabled_tools = ["query"]
tool_timeout_sec = 20
startup_timeout_sec = 20

