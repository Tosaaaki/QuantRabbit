# QuantRabbit local-safe MCP config (read-only by design)
#
# These MCP servers are observation-only. Keep the paths anchored to the live
# workspace, not to old Documents/App checkouts.
[mcp_servers.qr_local_trades_db]
command = "python3"
args = [
  "/Users/tossaki/App/QuantRabbit/archive/scripts/mcp_sqlite_readonly.py",
  "--db",
  "/Users/tossaki/App/QuantRabbit/logs/trades.db",
]
enabled_tools = ["query"]
tool_timeout_sec = 20
startup_timeout_sec = 20

