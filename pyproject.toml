[tool.black]
line-length = 88
target-version = ["py312"]
extend-exclude = '''
/(
    \.claude
  | \.gcloud
  | \.worktrees
)/
'''

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = [".claude", ".gcloud", ".worktrees"]

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, W: pycodestyle warnings
select = ["E", "F", "W"]
# Ignore common noisy rules
ignore = [
    "E401",   # multiple imports on one line
    "E501",   # line too long (black handles this)
    "E402",   # module level import not at top of file
    "E741",   # ambiguous variable name (l for low in OHLC is standard)
    "F401",   # imported but unused (many __init__.py re-exports)
    "F811",   # redefinition of unused name
    "F821",   # undefined name (many dynamic/runtime patterns)
    "F841",   # local variable assigned but never used
    "W605",   # invalid escape sequence (common in docstrings)
]
